services:
  app:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ""
        VITE_AMAP_WEB_MAP_KEY: ${VITE_AMAP_WEB_MAP_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3101
      APP_DATA_PATH: /data/ai-house-assistant.json
    volumes:
      - app-data:/data
    ports:
      - "127.0.0.1:3101:3101"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  app-data:
  caddy-data:
  caddy-config:
